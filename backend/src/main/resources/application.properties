spring.application.name=EduControl

# H2 Database - file persistente local
spring.datasource.url=jdbc:h2:file:./data/educontrol;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=educontrol
spring.datasource.password=educontrol123

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 Console (acesse: http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Server
server.port=8080

# OpenAI API
openai.api.key=SUA_CHAVE_OPENAI_AQUI
openai.api.url=https://api.openai.com/v1/chat/completions
openai.model=gpt-4o-mini

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Sao_Paulo
